name: Verify Millennium 3.2

on:
  pull_request:
  push:
    branches:
      - main
      - "fix/**"
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

jobs:
  quality:
    name: Syntax, build and core regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Millennium 3.2 checks
        run: npm test

  verify-published:
    name: Verify published GitHub Pages build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify published build and required files
        run: node scripts/verify-deploy.mjs --build 3.2.1
