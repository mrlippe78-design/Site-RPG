<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Millennium RPG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;700;800&family=Cinzel:wght@500;700;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="auth-screen" id="authScreen">
      <div class="auth-art">
        <div class="brand big">
          <div class="brand-mark">M</div>
          <div>
            <p>Millennium RPG</p>
            <span>Suporte de campanha</span>
          </div>
        </div>
        <h1>Millennium RPG</h1>
        <p>
          Um salão de suporte para ficha, roleta, inventário, guildas, missões,
          diário de campanha, denúncias e conversas entre jogadores.
        </p>
      </div>

      <div class="auth-card">
        <p class="eyebrow">Acesso</p>
        <h2>Entrar ou criar conta</h2>
        <form class="form-stack" data-form="login">
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Senha</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="split-actions">
            <button class="primary-button" type="submit">Entrar</button>
            <button class="ghost-button" type="button" data-action="register">Criar conta</button>
          </div>
        </form>
        <div class="auth-note" id="authNote" hidden></div>
        <div class="demo-actions" id="demoActions" hidden>
          <button class="ghost-button" type="button" data-action="demo-player">Demo Player</button>
          <button class="ghost-button" type="button" data-action="demo-admin">Demo Admin</button>
        </div>
      </div>
    </section>

    <div class="app-shell" id="appShell" hidden>
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <p>Millennium</p>
            <span id="roleLabel">Player</span>
          </div>
        </div>

        <nav class="nav-list" id="navList" aria-label="Navegação principal"></nav>

        <div class="sidebar-footer">
          <div class="mini-panel">
            <span>Temporada</span>
            <strong id="seasonLabel">Temporada 1</strong>
          </div>
          <button class="ghost-button full" type="button" data-action="logout">Sair</button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="contextLabel">Suporte da mesa</p>
            <h1 id="viewTitle">Painel</h1>
          </div>
          <div class="top-actions">
            <div class="gold-pill" id="moneyPill"><span>PO</span><strong>0</strong></div>
            <button class="icon-button" type="button" data-action="open-report" aria-label="Reportar problema" title="Reportar problema">!</button>
          </div>
        </header>

        <div class="global-notice" id="globalNotice"></div>
        <section id="viewHost"></section>
      </main>
    </div>

    <div class="modal" id="modal" hidden>
      <div class="modal-card">
        <button class="icon-button close" type="button" data-action="close-modal" aria-label="Fechar">×</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
