<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16120d" />
    <title>Millennium RPG</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;700;800&family=Cinzel:wght@500;700;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260710-mega5" />
  </head>
  <body>
    <div class="music-control" id="musicControl">
      <button class="music-float" id="musicToggle" type="button" data-action="toggle-music" aria-label="Ativar música ambiente" title="Música ambiente">♪</button>
      <label class="music-volume" for="musicVolume"><span>Volume</span><input id="musicVolume" data-action="music-volume" type="range" min="0" max="100" value="16" aria-label="Volume da música ambiente" /></label>
    </div>
    <section class="auth-screen" id="authScreen">
      <div class="auth-art">
        <div class="auth-runes" aria-hidden="true"></div>
        <div class="brand big">
          <div class="brand-mark">M</div>
          <div>
            <p>Millennium RPG</p>
            <span>Interface do Oráculo</span>
          </div>
        </div>
        <div class="auth-copy">
          <span class="season-chip">Temporada I · Despertar dos Heróis</span>
          <h1>MILLENNIUM</h1>
          <p>A Interface despertou. Escolhido detectado. Acesse ficha, afinidade, guilda, passe e Codex.</p>
        </div>
      </div>

      <div class="auth-card">
        <p class="eyebrow">Acesso</p>
        <h2>Identifique-se, escolhido.</h2>
        <form class="form-stack" data-form="login">
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Senha</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="split-actions">
            <button class="primary-button" type="submit">Entrar</button>
            <button class="ghost-button" type="button" data-action="register">Criar conta</button>
          </div>
        </form>
        <div class="auth-note" id="authNote" hidden></div>
        <div class="demo-actions" id="demoActions" hidden>
          <button class="ghost-button" type="button" data-action="demo-player">Demo Player</button>
          <button class="ghost-button" type="button" data-action="demo-admin">Demo Admin</button>
        </div>
      </div>
    </section>

    <div class="app-shell" id="appShell" hidden>
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <p>Millennium</p>
            <span id="roleLabel">Player</span>
          </div>
        </div>

        <nav class="nav-list" id="navList" aria-label="Navegação principal"></nav>

        <div class="sidebar-footer">
          <div class="mini-panel">
            <span>Temporada</span>
            <strong id="seasonLabel">Temporada 1</strong>
          </div>
          <button class="ghost-button full" type="button" data-action="logout">Sair</button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="contextLabel">Suporte da mesa</p>
            <h1 id="viewTitle">Painel</h1>
          </div>
          <div class="top-actions">
            <div class="quick-status" id="quickStatus"></div>
            <div class="gold-pill" id="moneyPill"><span>PO</span><strong>0</strong></div>
            <button class="icon-button notify-button" type="button" data-nav="profile" aria-label="Abrir notificações" title="Notificações">✉<span id="notifyCount" hidden>0</span></button>
            <button class="icon-button" type="button" data-action="open-report" aria-label="Reportar problema" title="Reportar problema">!</button>
          </div>
        </header>

        <div class="global-notice" id="globalNotice"></div>
        <section id="viewHost"></section>
      </main>
      <nav class="mobile-bottom-nav" id="mobileBottomNav" aria-label="Navegação rápida mobile"></nav>
    </div>

    <div class="modal" id="modal" hidden>
      <div class="modal-card">
        <button class="icon-button close" type="button" data-action="close-modal" aria-label="Fechar">×</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js?v=20260710-mega5"></script>
  </body>
</html>
